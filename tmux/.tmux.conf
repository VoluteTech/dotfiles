# --- Terminal & Colors ---
# Set default terminal to tmux-256color for better compatibility
set -ag terminal-overrides ",xterm-256color:RGB"

# Use zsh shell
set -g default-shell /usr/bin/zsh

# Change status line colors
set -g status-style 'bg=#333333 fg=#5eacd3'

set -g base-index 1

# --- Keybindings ---
set -g prefix C-s
unbind C-b
bind-key C-s send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Pane resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Custom Scripts (Sessionizer & cht.sh)
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r h run-shell "tmux neww ~/.local/bin/cht-sh"
bind-key -r M-h run-shell "tmux neww tmux-sessionizer -s 0"
bind-key -r M-t run-shell "tmux neww tmux-sessionizer -s 1"
bind-key -r M-n run-shell "tmux neww tmux-sessionizer -s 2"
bind-key -r M-s run-shell "tmux neww tmux-sessionizer -s 3"

# --- General Settings ---
set -g mouse on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Vi keys for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Plugins & Theming ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session management plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# --- Initialize TPM ---
# (Keep this as the very last line)
run '~/.tmux/plugins/tpm/tpm'
